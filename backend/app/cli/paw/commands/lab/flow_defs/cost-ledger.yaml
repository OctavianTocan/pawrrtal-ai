id: cost-ledger
title: Cost and usage ledger check
description: Confirm model usage events reach cost accounting for web and Telegram-originated turns.
commands:
  - paw verify cost --model MODEL --json
  - paw lab telegram chat --model MODEL --turns cost.txt --json
  - paw cost ledger --json
checks:
  - Usage events include input and output tokens when the provider reports them.
  - New ledger rows reference the conversation and model.
