id: telegram-polish-loop
title: Telegram polish feedback loop
description: Try a small rendering or agent-output change in Telegram, collect taste feedback, and generalize it into Pawrrtal conventions.
commands:
  - paw lab telegram chat --model MODEL --turns polish-turns.txt --new --verbose 2 --json
  - paw lab telegram media --model MODEL --text "describe what you see and transcribe the voice note" --image sample.jpg --voice-note sample.ogg --voice-duration 4 --new --verbose 2 --json
  - paw lab telegram providers --host agy-api --host xai --text "describe what you see and transcribe the voice note" --image sample.jpg --voice-note sample.ogg --voice-duration 4 --verbose 2 --json
  - paw lab runs show RUN_ID --json
  - paw lab runs review RUN_ID --question "What should feel cleaner before we ship this?"
  - paw lab flows show telegram-polish-loop
checks:
  - 'Tool labels use Title Case with a clear target, such as "List Folder: backend/app".'
  - "Long folder or search outputs are summarized first instead of dumped in full."
  - "Thinking remains visible but visually distinct from final answer text."
  - "The run log captures enough timing and event evidence to compare alternatives."
  - "The review packet includes the prompt, model, Telegram-visible transcript, timing, media summary, run path, and the specific taste question for the user."
  - "Text, image, and voice-note paths are checked before a Telegram-facing rendering change is treated as polished."
  - "Any accepted taste lesson is recorded in .agents/skills/pawrrtal-taste/SKILL.md, DESIGN.md, or a flow checklist."
