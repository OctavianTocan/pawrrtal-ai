id: telegram-long-chat
title: Telegram-visible long model conversation
description: Drive a multi-turn Telegram conversation through the real dispatcher using dev-only synthetic inbound updates.
commands:
  - paw lab telegram chat --model MODEL --turns turns.txt --new --verbose 2 --json
  - paw channels diagnose-telegram --conversation-id CONVERSATION_ID --json
checks:
  - Replies are visible in Telegram.
  - Persisted assistant rows are complete.
  - Thinking and tool calls are visible when verbose level is 2.
  - Temporary model and verbosity choices are explicit in the run log.
