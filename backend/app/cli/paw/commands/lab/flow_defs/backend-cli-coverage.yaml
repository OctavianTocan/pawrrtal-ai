id: backend-cli-coverage
title: Backend surface to Paw CLI coverage
description: Verify that important backend route families have an opinionated paw command or an explicit raw API fallback.
commands:
  - paw api ls --json
  - paw workspaces ls --json
  - paw workspace status --json
  - paw workspace skills --json
  - paw projects ls --json
  - paw profile get --json
  - paw appearance get --json
  - paw models ls --json
  - paw completions autocomplete "draft text" --json
  - paw conversations send "coverage smoke" --new --json
  - paw heartbeat sync --json
  - paw audit summary --json
  - paw cost summary --json
  - paw lcm context CONVERSATION_ID --json
  - paw lab flows ls --json
checks:
  - "Every repeatedly operated backend family has a dedicated paw command."
  - "UI-only or OAuth callback routes are still reachable through paw api request/openapi/ls."
  - "Human output is compact; --json carries full evidence for logs and tests."
  - "Flow-heavy behavior has a paw verify suite or a paw lab flow checklist."
