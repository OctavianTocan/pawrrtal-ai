name: Integration Tests

# Runs the live-API integration suite under ``backend/tests/integration/``.
#
# Costs real LLM tokens (a few cents per run on the cheapest models)
# so we ONLY trigger on:
#
#   - PRs that actually touch the agent loop, providers, tools, or
#     the integration suite itself;
#   - manual ``workflow_dispatch`` for ad-hoc verification.
#
# Pushes to ``development`` / ``main`` get the unit suite from
# ``tests.yml``; running integration tests on every push to
# ``development`` would burn tokens on commits that didn't change
# anything the suite covers.

on:
  pull_request:
    branches: [development, main]
    paths:
      - 'backend/app/core/agent_loop/**'
      - 'backend/app/core/agent_tools.py'
      - 'backend/app/core/agent_system_prompt.py'
      - 'backend/app/core/providers/**'
      - 'backend/app/core/tools/**'
      - 'backend/tests/integration/**'
      - '.github/workflows/integration-tests.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

# Cancel stale runs on the same PR so rapid pushes don't stack token
# spend.
concurrency:
  group: integration-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Integration suite
    if: >-
      (github.actor == 'OctavianTocan' || github.actor == 'octagent') &&
      (github.event_name != 'pull_request' ||
        github.event.pull_request.head.repo.full_name == github.repository)
    # Self-hosted to keep token spend bounded: the runner already has
    # the Claude CLI + uv installed locally (no per-run install of
    # 「@anthropic-ai/claude-code」) and the network egress to Anthropic
    # is on Tavi's box, not GitHub's.  Reserving 「ubuntu-latest」 for
    # the GitHub-hosted-only workloads (「playwright install --with-deps」
    # in the dev-console smoke).
    runs-on: [self-hosted, pawrrtal]
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --frozen

      # Self-hosted pawrrtal runners don't carry node/npm by default,
      # and the comment in this workflow that claimed the CLI was
      # "already installed locally" was stale — every run of this job
      # was failing on `npm: command not found`.  setup-node provides
      # both binaries on PATH for the duration of the job, with caching.
      - name: Setup Node.js (for npm install of the Claude CLI)
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      # Install the Claude CLI so the SDK has a binary to spawn.
      # ``claude-agent-sdk`` runs the CLI as a subprocess; without it
      # the integration tests fail at provider construction time.
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run integration suite
        working-directory: backend
        env:
          # The gate that opts the suite in.  Without this every test
          # in tests/integration/ skips, even with credentials present.
          RUN_INTEGRATION_TESTS: '1'
          # Cheapest Claude model the SDK will accept; the conftest
          # reads this env var.  Override here if a cheaper model
          # ships before we update the default.
          CLAUDE_INTEGRATION_MODEL: 'claude-haiku-4-5'
          # Provider auth.  Stored in repo secrets, injected here.
          # When the secret is absent the per-test fixture skips
          # cleanly with a clear message.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Same scaffolding as the unit-test workflow.  pydantic-settings
          # requires these at import time, even though the integration
          # tests don't go near the database.
          AUTH_SECRET: ci-not-a-secret
          GOOGLE_API_KEY: ci-not-a-key
          # Required by Settings.workspace_encryption_key (no default).
          WORKSPACE_ENCRYPTION_KEY: 'zG9KQK6sH0xLm4LJ4n8C9aD2vF3gN5pT7rE1yU8xKqM='
          CORS_ORIGINS: '["http://localhost:53001"]'
          DATABASE_URL: 'sqlite+aiosqlite:///:memory:'
        run: uv run pytest tests/integration/ -v --tb=short
