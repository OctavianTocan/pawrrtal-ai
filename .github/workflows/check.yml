name: Frontend Check

# Gates Biome lint, TypeScript typecheck, and the 500-line file budget.
# Mirrors `bun run check` (and `just check`) so that what passes locally is
# what passes in CI. AGENTS.md claims this gate exists; this workflow is
# what makes the claim true.

on:
  pull_request:
    branches: [development, main]
    paths:
      - 'frontend/**'
      - 'scripts/check-file-lines.mjs'
      - 'scripts/check-nesting.mjs'
      - 'biome.json'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/check.yml'
  push:
    branches: [development, main]
    paths:
      - 'frontend/**'
      - 'scripts/check-file-lines.mjs'
      - 'scripts/check-nesting.mjs'
      - 'biome.json'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/check.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: bun run check
    if: >-
      (github.actor == 'OctavianTocan' || github.actor == 'octagent') &&
      (github.event_name != 'pull_request' ||
        github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: [self-hosted, pawrrtal]
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build local libs (frontend/lib/* submodules)
        run: bash scripts/build-local-libs.sh

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Fumadocs source files
        working-directory: frontend
        run: bun run generate:docs

      - name: Run check (Biome + TypeScript + file-lines)
        id: check
        working-directory: frontend
        run: |
          set +e
          bun run check 2>&1 | tee ../check-output.txt
          status=${PIPESTATUS[0]}
          {
            echo 'output<<EOF'
            cat ../check-output.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Comment PR on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        env:
          CHECK_OUTPUT: ${{ steps.check.outputs.output }}
        with:
          script: |
            const output = process.env.CHECK_OUTPUT || '';
            const body = [
              '### `bun run check` failed',
              '',
              'One of the gates in `frontend/package.json`\'s `check` script reported errors:',
              '',
              '- **Biome** — lint or format violations',
              '- **TypeScript** — `tsc --noEmit` type errors',
              '- **File-lines** — `node scripts/check-file-lines.mjs` 500-line budget overflow',
              '- **Nesting** — `node scripts/check-nesting.mjs` depth-3 budget overflow',
              '',
              'Reproduce locally with `cd frontend && bun run check` (or `just check`).',
              '',
              '<details><summary>output (last 6000 chars)</summary>',
              '',
              '```',
              output.slice(-6000),
              '```',
              '',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
