name: Skill Gen

on:
  pull_request:
    branches: [development, main]
    paths:
      - 'backend/**/*.py'
      - 'packages/ci/skill-gen/**'
      - '.cursor/plugins/pawrrtal/skills/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/skill-gen.yml'
  push:
    branches: [development, main]
    paths:
      - 'backend/**/*.py'
      - 'packages/ci/skill-gen/**'
      - '.cursor/plugins/pawrrtal/skills/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/skill-gen.yml'

permissions:
  contents: read

concurrency:
  group: skill-gen-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: skill-gen check
    if: >-
      github.actor == 'OctavianTocan' &&
      (github.event_name != 'pull_request' ||
        github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: [self-hosted, openclaw-mini, pawrrtal]
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run skill-gen e2e test
        run: bun run skill-gen:e2e-test

      - name: Check generated skills
        run: bun run skill-gen:check
