name: Stagehand AI E2E

# Runs the AI-driven E2E suite under frontend/e2e/stagehand/.
# Costs real LLM tokens, so we ONLY run on:
#  - PRs that touch frontend code, the suite itself, the workflow, or the
#    cache (so cache updates can land via PR);
#  - manual workflow_dispatch (for ad-hoc verification).
# We deliberately do NOT run this on every push to main — that would
# burn tokens for every commit that didn't change UI behavior.
on:
  pull_request:
    branches: [development, main]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'frontend/e2e/stagehand/**'
      - 'frontend/playwright.stagehand.config.ts'
      - 'frontend/.stagehand-cache/**'
      - '.github/workflows/stagehand-e2e.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

# Cancel stale runs when a new commit lands on the same PR — keeps
# token spend bounded when developers push rapidly.
concurrency:
  group: stagehand-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Suppress the Stagehand AI-SDK warning that fires on every observe/
  # extract call (it's a generic security note, not a problem here).
  STAGEHAND_SUPPRESS_SDK_WARNINGS: '1'

jobs:
  stagehand:
    name: Stagehand suite
    if: >-
      (github.actor == 'OctavianTocan' || github.actor == 'octagent') &&
      (github.event_name != 'pull_request' ||
        github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Set up Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: '22'

      - name: Build local libs (frontend/lib/* submodules)
        run: bash scripts/build-local-libs.sh
      - name: Set up Python (for backend dev-login endpoint)
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v6.0.1

      - name: Install ffmpeg (for run.gif generation)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --frozen

      # Stagehand cache restore. Key includes the lockfile so that any
      # dependency bump (which can change the LLM-prompt schema and
      # therefore the cache key) gets a fresh start. Restore-keys lets
      # us inherit a partial cache when only the lockfile changed —
      # better than starting cold.
      - name: Restore Stagehand action cache
        id: stagehand-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: frontend/.stagehand-cache
          key: stagehand-cache-${{ hashFiles('frontend/bun.lock', 'frontend/e2e/stagehand/**') }}
          restore-keys: |
            stagehand-cache-

      - name: Install Playwright Chromium
        working-directory: frontend
        run: bunx --bun playwright install --with-deps chromium

      - name: Start backend (dev-login + chat endpoints)
        working-directory: backend
        env:
          # Required pydantic-settings fields — dummy values are fine for E2E
          # (no real cloud calls; AI keys come from secrets in the run step).
          AUTH_SECRET: e2e-not-a-secret
          GOOGLE_API_KEY: e2e-not-a-key
          # Required by Settings.workspace_encryption_key (no default).
          WORKSPACE_ENCRYPTION_KEY: 'zG9KQK6sH0xLm4LJ4n8C9aD2vF3gN5pT7rE1yU8xKqM='
          CORS_ORIGINS: '["http://localhost:3000"]'
          DATABASE_URL: 'sqlite+aiosqlite:///./e2e.db'
          ADMIN_EMAIL: e2e-admin@example.com
          ADMIN_PASSWORD: e2e-admin-password
          # workspace_base_dir defaults to /data/workspaces which the CI
          # runner cannot write to. Point at a temp directory so the
          # dev-login workspace seed succeeds.
          WORKSPACE_BASE_DIR: /tmp/pawrrtal-e2e-workspaces
          COOKIE_SAMESITE: lax
          COOKIE_SECURE: 'false'
        run: |
          uv run uvicorn main:app --host 127.0.0.1 --port 8000 &
          echo $! > /tmp/backend.pid
          # Fail fast if backend doesn't come up within 30s — saves us
          # from spending LLM tokens against a broken stack.
          for i in $(seq 1 30); do
            if curl -sSf http://127.0.0.1:8000/openapi.json > /dev/null 2>&1; then
              echo "Backend ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Backend did not start within 30s"
          exit 1

      - name: Generate Fumadocs source files
        working-directory: frontend
        run: bun run generate:docs

      - name: Build frontend (Next.js)
        working-directory: frontend
        env:
          BACKEND_INTERNAL_URL: http://127.0.0.1:8000
        run: bun run build

      - name: Start frontend
        working-directory: frontend
        env:
          E2E_API_URL: http://127.0.0.1:8000
        run: |
          PORT=3000 bun run start &
          echo $! > /tmp/frontend.pid
          for i in $(seq 1 30); do
            if curl -sSf http://127.0.0.1:3000 > /dev/null 2>&1; then
              echo "Frontend ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Frontend did not start within 30s"
          exit 1

      - name: Run Stagehand suite (headless, with cache)
        working-directory: frontend
        env:
          STAGEHAND_HEADLESS: '1'
          E2E_BASE_URL: http://127.0.0.1:3000
          E2E_API_URL: http://127.0.0.1:8000
          # Stagehand uses dedicated STAGEHAND_*_API_KEY env vars so
          # the backend's GOOGLE_API_KEY (used for pydantic-settings
          # validation) doesn't accidentally trigger LLM calls.
          # If none are set, all 11 tests skip cleanly (exit 0).
          STAGEHAND_GOOGLE_API_KEY: ${{ secrets.STAGEHAND_GOOGLE_API_KEY }}
          STAGEHAND_OPENAI_API_KEY: ${{ secrets.STAGEHAND_OPENAI_API_KEY }}
          STAGEHAND_ANTHROPIC_API_KEY: ${{ secrets.STAGEHAND_ANTHROPIC_API_KEY }}
        run: bun run e2e:stagehand

      # Always upload artifacts even on failure — the trace / report /
      # gif are how we debug a failing AI run.
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Upload per-test artifacts (trace, video, gif)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: stagehand-test-results
          path: frontend/test-results/
          retention-days: 14

      - name: Stop backend + frontend
        if: always()
        run: |
          [ -f /tmp/backend.pid ] && kill -9 "$(cat /tmp/backend.pid)" 2>/dev/null || true
          [ -f /tmp/frontend.pid ] && kill -9 "$(cat /tmp/frontend.pid)" 2>/dev/null || true
