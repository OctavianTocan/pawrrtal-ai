name: Backend-TS Tests

# Mirrors tests.yml but for the Effect TS strangler in backend-ts/.
# Runs @effect/vitest on apps/api + packages/api-core.
# Slice 1 of `pawrrtal-h6pb` (backend-ts CI workflow Vitest gate on backend-ts).

on:
  pull_request:
    branches: [development, main]
    paths:
      - 'backend-ts/**'
      - 'bun.lock'
      - 'backend-ts/bun.lock'
      - 'vitest.shared.ts'
      - '.github/workflows/backend-ts-tests.yml'
  push:
    branches: [development, main]
    paths:
      - 'backend-ts/**'
      - 'bun.lock'
      - 'backend-ts/bun.lock'
      - 'vitest.shared.ts'
      - '.github/workflows/backend-ts-tests.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: backend-ts-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vitest:
    name: backend-ts Vitest
    # OctavianTocan-only gate (see .claude/rules/github-actions/
    # octaviantocan-only-and-self-hosted-runner.md). The runner is
    # self-hosted on Octavian's VPS and already has bun + the
    # backend-ts workspace installed (no per-run install of Node
    # devDeps — that runs in the `Install dependencies` step).
    if: >-
      (github.actor == 'OctavianTocan' || github.actor == 'octagent') &&
      (github.event_name != 'pull_request' ||
        github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: [self-hosted, pawrrtal]
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run @effect/vitest
        working-directory: backend-ts
        id: test
        run: |
          set +e
          bun run test 2>&1 | tee ../backend-ts-test-output.txt
          status=${PIPESTATUS[0]}
          {
            echo 'output<<EOF'
            cat ../backend-ts-test-output.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Comment PR on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        env:
          TEST_OUTPUT: ${{ steps.test.outputs.output }}
        with:
          script: |
            const output = process.env.TEST_OUTPUT || '';
            const body = [
              '### `backend-ts` Vitest failed',
              '',
              'Reproduce locally with `cd backend-ts && bun run test`.',
              '',
              '<details><summary>output (last 6000 chars)</summary>',
              '',
              '```',
              output.slice(-6000),
              '```',
              '',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
