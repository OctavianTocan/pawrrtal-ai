# sentrux architectural rules for Pawrrtal
# Run locally:   sentrux check .
# Run in CI:     same — exits 1 on violation
#
# Layer ordering convention (sentrux): LOWER order = HIGHER in the stack
# (the consumer); HIGHER order = MORE foundational. Imports must flow from
# lower-order layers DOWN to higher-order layers, never the reverse.

[constraints]
# `Base` lives in `backend/app/db_base.py` so models.py and db.py both
# pull from it without back-referencing each other. The previous SCC
# (db.py's lazy `from app import models` ↔ models.py's `from .db import
# Base`) is closed; cycle budget stays at 0.
max_cycles = 0
max_coupling = "C"
max_cc = 30
no_god_files = true

# --- Frontend layers (top → bottom) ---

[[layers]]
name = "fe-app"
paths = ["frontend/app/*"]
order = 0

[[layers]]
name = "fe-features"
paths = ["frontend/features/*"]
order = 1

[[layers]]
name = "fe-shell"
paths = ["frontend/components/app-*", "frontend/components/nav-*", "frontend/components/new-*", "frontend/components/signup-form.tsx"]
order = 1

[[layers]]
name = "fe-ai-elements"
paths = ["frontend/components/ai-elements/*"]
order = 2

[[layers]]
name = "fe-ui-primitives"
paths = ["frontend/components/ui/*", "frontend/components/icons/*"]
order = 3

[[layers]]
name = "fe-lib"
paths = ["frontend/lib/*", "frontend/hooks/*"]
order = 4

# `frontend/packages/` doesn't currently exist in the repo — workspace
# packages live under `frontend/lib/react-{dropdown,overlay,chat-composer}/`
# and are covered by `fe-lib`. The `fe-vendor` layer is reserved for the
# day workspace packages move under `frontend/packages/`.
[[layers]]
name = "fe-vendor"
paths = ["frontend/packages/*"]
order = 4

# --- Backend layers (top → bottom) ---

[[layers]]
name = "be-entry"
paths = ["backend/main.py", "backend/app/cli/*"]
order = 0

[[layers]]
name = "be-api"
paths = ["backend/app/chat/*", "backend/app/conversations/*", "backend/app/workspace/*", "backend/app/projects/*", "backend/app/integrations/*"]
order = 1

[[layers]]
name = "be-crud"
paths = ["backend/app/*/crud.py", "backend/app/*/crud/*"]
order = 2

[[layers]]
name = "be-models"
paths = ["backend/app/infrastructure/models/*", "backend/app/models.py", "backend/app/schemas.py"]
order = 3

[[layers]]
name = "be-core"
# Only leaf-level foundations are pinned here. Mixed runtime packages such as
# `app.tools`, `app.lcm`, `app.turns`, `app.infrastructure.event_bus`, and
# concrete channel adapters are intentionally enforced by focused import-linter
# contracts until their model/persistence dependencies are split behind smaller
# interfaces.
paths = ["backend/app/db_base.py", "backend/app/logger_setup.py"]
order = 4

# --- Boundaries (deny lists) ---

[[boundaries]]
from = "frontend/*"
to = "backend/*"
reason = "Frontend must talk to backend only via HTTP, never import Python."

[[boundaries]]
from = "backend/*"
to = "frontend/*"
reason = "Backend has no business reaching into frontend."
