# Pawrrtal — base Compose file (service definitions shared by all environments)
#
# This file defines service topology only — no published ports.
# Use an overlay for ports and dev-only settings:
#
#   Local development (ports published to host, hot-reload):
#     docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
#   Production (VPS + Tailscale Serve):
#     docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# The backend is available inside the Docker network at http://backend:8000.
# The postgres instance is reachable inside the Docker network at postgres:5432.
# To connect with a local DB client during development, use docker-compose.dev.yml.
#
# Migrations run automatically on backend startup; no manual step needed.

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pawrrtal
      POSTGRES_PASSWORD: pawrrtal_dev
      POSTGRES_DB: pawrrtal
    # No `ports` here — publish on the host only in docker-compose.dev.yml.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pawrrtal -d pawrrtal"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  # FastAPI backend
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Override the DATABASE_URL from .env so it points at the compose
      # postgres service regardless of what the user typed in .env.
      DATABASE_URL: "postgresql://pawrrtal:pawrrtal_dev@postgres:5432/pawrrtal"
      # watchfiles uses kernel inotify by default, which doesn't fire
      # reliably for changes made on the host through a Docker bind mount.
      # Force polling so uvicorn --reload actually reloads on every save.
      WATCHFILES_FORCE_POLLING: "true"
    # No `ports` here — publish :8000 on the host only in docker-compose.dev.yml.
    depends_on:
      postgres:
        condition: service_healthy
    # Override the production CMD: run migrations (with retry) then start
    # uvicorn with --reload so source-mount edits apply immediately.
    command: >
      sh -c '
        until alembic upgrade head; do
          echo "[docker-compose] alembic failed, retrying in 2s…" && sleep 2;
        done &&
        uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      '
    volumes:
      # Mount the backend source for hot-reload: uvicorn --reload detects
      # file changes inside the container and restarts the worker in-place.
      # New files in the image layer (e.g. alembic versions) still require
      # `docker compose build backend` + restart.
      - ./backend/app:/app/app
      # Workspace data lives outside the container so it persists across
      # restarts and is not wiped by `docker compose down`.
      - workspace_data:/data/workspaces

volumes:
  postgres_data:
  workspace_data:
